name: 'QueryDoctor SQL Review'
description: >-
  Lints changed .sql files in a pull request (sqlglot-based, no LLM) and
  posts the findings as a PR comment.
author: 'Aravindhraja R'
branding:
  icon: 'activity'
  color: 'green'

inputs:
  github-token:
    description: 'Token used to read PR files and post the review comment.'
    required: false
    default: ${{ github.token }}
  dialect:
    description: >-
      SQL dialect to lint against. One of: bigquery, postgres, mysql,
      snowflake, spark, sqlite, tsql, oracle, duckdb, redshift.
    required: false
    default: 'bigquery'
  file-patterns:
    description: >-
      Comma-separated glob pattern(s) matched against changed file paths.
    required: false
    default: '**/*.sql'
  dbt-mode:
    description: >-
      Strip dbt/Jinja templating ({{ ref(...) }}, {{ source(...) }}, etc.)
      before linting so dbt model files don't false-positive as syntax
      errors. Best-effort regex stubbing, not a real `dbt compile`.
    required: false
    default: 'false'
  api-key:
    description: >-
      QueryDoctor Cloud API key. Paid-tier only — required for
      fail-on-severity to actually block the merge. Only the key is sent
      to the hosted API to verify the license; SQL is always linted
      locally and never leaves this workflow run. Without a key,
      fail-on-severity has no effect (comment-only).
    required: false
    default: ''
  fail-on-severity:
    description: >-
      Paid feature. One of: low, medium, high. If set and a valid
      api-key is provided, the Action exits non-zero (blocking the PR
      check) when any finding meets or exceeds this severity.
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.12'

    - name: Install sqlglot
      shell: bash
      run: pip install --quiet 'sqlglot>=30.0'

    - name: Run QueryDoctor review
      shell: bash
      env:
        GITHUB_TOKEN: ${{ inputs.github-token }}
        INPUT_DIALECT: ${{ inputs.dialect }}
        INPUT_FILE_PATTERNS: ${{ inputs.file-patterns }}
        INPUT_DBT_MODE: ${{ inputs.dbt-mode }}
        INPUT_API_KEY: ${{ inputs.api-key }}
        INPUT_FAIL_ON_SEVERITY: ${{ inputs.fail-on-severity }}
      run: python "${{ github.action_path }}/action/review_pr.py"
